<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MIS 课件批量下载器</title>
  <link rel="stylesheet" href="page.css">
</head>
<body>
  <!-- ── 顶部栏 ── -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">📚 MIS 课件下载器</span>
    </div>
    <div class="topbar-center">
      <!-- 联通状态 -->
      <div class="conn-badges">
        <div class="conn-item" id="misBadge" title="MIS 登录状态">
          <span class="conn-dot" id="misDot"></span>
          <span id="misLabel">MIS 检测中</span>
        </div>
        <div class="conn-divider">|</div>
        <div class="conn-item" id="courseBadge" title="课程平台连接状态">
          <span class="conn-dot" id="courseDot"></span>
          <span id="courseLabel">课程平台 检测中</span>
        </div>
        <button id="btnRecheck" class="btn btn-xs btn-ghost-top" title="重新检测">↻</button>
      </div>
    </div>
    <div class="topbar-right">
      <!-- Keep-alive 开关 -->
      <div class="keepalive-row">
        <label class="toggle-label">
          <span>防过期</span>
          <label class="toggle-switch">
            <input type="checkbox" id="keepAliveToggle">
            <span class="toggle-thumb"></span>
          </label>
        </label>
        <span class="ka-info-icon"
          data-tooltip="防止 MIS 登录会话因长时间未操作而过期。开启后每 5 分钟自动向 MIS 首页发送一次带 Cookie 的心跳请求，触发服务器端会话续期，避免下载途中突然失效需要重新登录。底层使用 Chrome Alarms API 定时唤醒 Service Worker，在后台静默发起请求，不打开任何新页面。">ⓘ</span>
        <span id="keepAliveInfo" class="keepalive-info"></span>
        <button id="btnPingNow" class="btn btn-xs btn-ghost-top" title="立即向 MIS 发送心跳、刷新登录会话">刷新</button>
      </div>
      <!-- 根目录 -->
      <label class="setting-inline">
        目录：<input type="text" id="rootFolder" value="课程资料" style="width:80px">
      </label>
    </div>
  </header>

  <!-- ── 登录提示 ── -->
  <div id="loginWarning" class="login-warning hidden">
    <div class="warning-box">
      <div class="warning-icon">⚠</div>
      <div class="warning-text">
        <h3 id="warningTitle">请先登录 MIS 系统</h3>
        <p id="warningDetail">未检测到有效的登录状态，请先在浏览器中登录 BJTU MIS 系统，然后进入课程平台，再回到本页面操作。</p>
        <div class="warning-actions">
          <a href="https://mis.bjtu.edu.cn/" target="_blank" class="btn btn-primary">打开 MIS 系统</a>
          <button id="btnRetryCheck" class="btn btn-outline">重新检测</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 主体 ── -->
  <main id="mainContent" class="main-layout hidden">
    <!-- 左侧课程列表 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">我的课程</span>
        <span id="courseCount" class="count-badge">0</span>
      </div>
      <div class="sidebar-actions">
        <button id="btnScanAll" class="btn btn-primary btn-full">🔍 扫描全部课件</button>
        <div class="select-row">
          <button id="btnSelectAllCourses" class="btn btn-xs">全选</button>
          <button id="btnDeselectCourses" class="btn btn-xs">取消</button>
          <button id="btnDownloadSelected" class="btn btn-xs btn-success">⬇ 下载已选</button>
        </div>
      </div>
      <div id="courseList" class="course-list">
        <div class="empty-tip">正在加载课程列表...</div>
      </div>
    </aside>

    <!-- 右侧内容区 -->
    <section class="content-panel">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="files">课件浏览</button>
        <button class="tab-btn" data-tab="progress">下载进度</button>
      </div>

      <!-- 课件浏览 -->
      <div id="tabFiles" class="tab-content active">
        <div class="file-toolbar">
          <span id="fileStats" class="file-stats">请先扫描课程</span>
          <div class="file-toolbar-right">
            <button id="btnSelectAllFiles" class="btn btn-xs">全选</button>
            <button id="btnDeselectFiles" class="btn btn-xs">取消</button>
            <button id="btnDownloadFiles" class="btn btn-primary btn-sm">⬇ 下载选中</button>
          </div>
        </div>
        <div id="filePanel" class="file-panel">
          <div class="empty-tip">点击左侧「扫描全部课件」或单个课程旁的「扫描」按钮</div>
        </div>
      </div>

      <!-- 下载进度 -->
      <div id="tabProgress" class="tab-content">
        <div class="progress-header">
          <div class="progress-bar-wrap">
            <div id="progressBar" class="progress-bar" style="width:0%"></div>
          </div>
          <span id="progressText" class="progress-text">0 / 0</span>
          <button id="btnStopDownload" class="btn btn-danger btn-sm hidden">停止</button>
          <button id="btnClearLog" class="btn btn-xs">清空</button>
        </div>
        <div id="progressLog" class="progress-log"></div>
      </div>
    </section>
  </main>

  <!-- 重复下载确认弹窗 -->
  <div id="dupModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">⚠ 部分文件已下载过</div>
      <div class="modal-subtitle" id="dupModalSubtitle"></div>
      <div id="dupModalList" class="dup-list"></div>
      <div class="modal-actions">
        <button id="dupSelectAll" class="btn btn-xs">全选</button>
        <button id="dupDeselectAll" class="btn btn-xs">全不选</button>
        <span style="flex:1"></span>
        <button id="dupCancel" class="btn btn-outline">取消</button>
        <button id="dupConfirm" class="btn btn-primary">确认下载</button>
      </div>
    </div>
  </div>

  <script src="page.js"></script>
</body>
</html>
